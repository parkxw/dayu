<script>
var WHL=[0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
var pos={};WHL.forEach(function(n,i){pos[n]=i;});
var REDS=new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
var BET_PER=10;        // 每号10元
var NUM_COUNT=7;       // 热区7号
var WIN_RETURN=360;    // 中1个回360
var LET=4, CHASE=3;    // 让4追3 (投注次数最少)
var MIN_DATA=50;       // 至少50局才算热区

var tbls={}, curId=null;
function clr(n){return n===0?'g':REDS.has(n)?'r':'b';}

function load(){
  try{tbls=JSON.parse(localStorage.getItem('hotzone_tbls'))||{};}catch(e){tbls={};}
  if(Object.keys(tbls).length===0){
    var id='t'+Date.now();tbls[id]={name:'盘1',data:[]};curId=id;
  }else{curId=localStorage.getItem('hotzone_cur')||Object.keys(tbls)[0];if(!tbls[curId])curId=Object.keys(tbls)[0];}
  save();
}
function save(){localStorage.setItem('hotzone_tbls',JSON.stringify(tbls));localStorage.setItem('hotzone_cur',curId);}
function getD(){return tbls[curId]?tbls[curId].data:[];}

// 计算最热区(中心±3=7号)。若当前盘锁定了热区,直接返回锁定值
function hottestZone(data){
  if(data.length<MIN_DATA)return null;
  var c={};data.forEach(function(n){c[n]=(c[n]||0)+1;});
  var best=null,bh=-1,bci=0;
  for(var ci=0;ci<37;ci++){
    var zone=[];for(var o=-3;o<=3;o++)zone.push(WHL[(ci+o+37)%37]);
    var h=0;zone.forEach(function(n){h+=(c[n]||0);});
    if(h>bh){bh=h;best=zone;bci=ci;}
  }
  var exp=data.length/37*7;
  var dev=(bh-exp)/exp*100;
  // 前后一致性
  var half=Math.floor(data.length/2);
  var c1={},c2={};
  data.slice(0,half).forEach(function(n){c1[n]=(c1[n]||0)+1;});
  data.slice(half).forEach(function(n){c2[n]=(c2[n]||0)+1;});
  var h1=0,h2=0;best.forEach(function(n){h1+=(c1[n]||0);h2+=(c2[n]||0);});
  var e1=half/37*7,e2=(data.length-half)/37*7;
  var d1=(h1-e1)/e1*100,d2=(h2-e2)/e2*100;
  return {zone:new Set(best),zoneArr:best,dev:dev,d1:d1,d2:d2,consistent:(d1>2&&d2>2)};
}

// 回放整个历史,计算当前状态机位置 + 盈亏
function computeState(data,zoneSet){
  // 逐局扫描状态机 + 一级/二级信号
  // phase: 'waiting'=等热区号 / 'letting'=让牌数局 / 'betting'=追击
  // missCount: 一级连续没中的轮数(0或1=一级粉, 2=升二级紫)
  // level: 1=一级(粉), 2=二级(紫)
  // 二级打3轮:l2round=二级已打轮数(0~2); 二级任意中或满3轮→重置回一级
  var phase='waiting',letCount=0,chaseCount=0;
  var missCount=0;   // 一级连黑轮数
  var l2round=0;     // 二级已打轮数
  var pnl=0,rounds=0,wins=0,losses=0;
  var betGames=0,hitGames=0;
  var curLoseStreak=0,maxLoseStreak=0;
  var curGap=0,maxGap=0;
  function curLevel(){return missCount>=2?2:1;}
  for(var i=0;i<data.length;i++){
    var n=data[i];
    var isHot=zoneSet.has(n);
    if(isHot){if(curGap>maxGap)maxGap=curGap;curGap=0;}else{curGap++;}
    if(phase==='waiting'){
      if(isHot){phase='letting';letCount=0;}
    }else if(phase==='letting'){
      if(isHot){letCount=0;}
      else{
        letCount++;
        if(letCount>=LET){phase='betting';chaseCount=0;}
      }
    }else if(phase==='betting'){
      chaseCount++;betGames++;
      pnl-=BET_PER*NUM_COUNT;
      var lvl=curLevel();
      if(isHot){
        // 中了→立刻重新让牌(不等下一个热区号)
        pnl+=WIN_RETURN;wins++;rounds++;hitGames++;
        phase='letting';letCount=0;chaseCount=0;
        curLoseStreak=0;
        missCount=0;l2round=0;  // 中了→重置回一级
      }else if(chaseCount>=CHASE){
        // 这一轮追满没中
        losses++;rounds++;
        phase='waiting';letCount=0;chaseCount=0;
        curLoseStreak++;
        if(curLoseStreak>maxLoseStreak)maxLoseStreak=curLoseStreak;
        if(lvl===1){
          missCount++;  // 一级没中,累加(满2轮后下次升二级)
        }else{
          // 二级没中
          l2round++;
          if(l2round>=3){missCount=0;l2round=0;}  // 二级3轮打完→重置回一级
        }
      }
    }
  }
  if(curGap>maxGap)maxGap=curGap;
  var cur={phase:phase,letCount:letCount,chaseCount:chaseCount,level:curLevel(),missCount:missCount,l2round:l2round};
  return {pnl:pnl,rounds:rounds,wins:wins,losses:losses,cur:cur,
          betGames:betGames,hitGames:hitGames,maxLoseStreak:maxLoseStreak,maxGap:maxGap,curLoseStreak:curLoseStreak};
}

var STAT_WINDOW=11100;
function statData(){var d=getD();return d.length>STAT_WINDOW?d.slice(d.length-STAT_WINDOW):d;}
function render(){
  renderTblBar();
  var data=getD();
  var sdata=statData();
  var hz=hottestZone(sdata);
  var betting=false,betLevel=1;
  if(hz){
    var state=computeState(sdata,hz.zone);
    betting=(state.cur.phase==='betting');
    betLevel=state.cur.level;
  }
  renderRecHint(hz);
  renderBoard(hz,betting,betLevel);
  renderRecPanel(hz);
  renderStreakBox(hz);
  save();
}
function renderStreakBox(hz){
  var el=document.getElementById('streakBox');
  if(!el)return;
  var data=getD();
  if(!hz){el.innerHTML='';return;}
  // 最近200局窗口内算当前连黑
  var win=data.length>200?data.slice(data.length-200):data;
  var s=computeState(win,hz.zone);
  var n=s.curLoseStreak;
  var color='#3b82f6';
  el.innerHTML='<div style="width:25%;margin:0 auto 10px;background:var(--s2);border:2px solid '+color+';border-radius:8px;padding:6px;text-align:center"><div style="font-size:22px;font-weight:900;color:'+color+'">'+n+'</div></div>';
}
function renderRecHint(hz){
  var el=document.getElementById('recHint');
  var data=getD();
  if(!hz){el.innerHTML='';return;}
  var state=computeState(data,hz.zone);
  var cur=state.cur;
  if(cur.phase==='waiting'){
    el.innerHTML='';
    return;
  }
  var txt='',bcolor='',anim='',label='';
  if(cur.phase==='letting'){
    // 让牌中:白色框
    bcolor='#ffffff';
    txt=cur.letCount+'/'+LET;
  }else if(cur.phase==='betting'){
    if(cur.level===2){
      // 二级紫色
      bcolor='#bb44ff';anim='animation:hotglow 1.1s infinite;';
      label='二级 '+(cur.l2round+1)+'/3轮 · ';
      txt=label+cur.chaseCount+'/'+CHASE;
    }else{
      // 一级粉色
      bcolor='#ff44cc';anim='animation:pinkglow 1.1s infinite;';
      label='一级 · ';
      txt=label+cur.chaseCount+'/'+CHASE;
    }
  }
  el.innerHTML='<div style="border:3px solid '+bcolor+';'+anim+'border-radius:8px;padding:10px;margin-bottom:8px;text-align:center;font-size:20px;font-weight:900;color:#fff;background:var(--s2)">'+txt+'</div>';
}

var backtestOn=false;
function toggleBacktest(){
  backtestOn=!backtestOn;
  var el=document.getElementById('backtestPanel');
  if(!backtestOn){el.innerHTML='';return;}
  var data=statData();
  var hz=hottestZone(data);
  if(!hz){el.innerHTML='<div style="background:var(--s2);border-radius:8px;padding:12px;font-size:12px;color:var(--dim)">数据不足(至少'+MIN_DATA+'局),无法回测</div>';return;}
  var s=computeState(data,hz.zone);
  var winRate=s.rounds?(s.wins/s.rounds*100).toFixed(1):0;
  var hitRate=s.betGames?(s.hitGames/s.betGames*100).toFixed(1):0;
  var pnlColor=s.pnl>=0?'#4ade80':'#f87171';
  var h='<div style="background:var(--s2);border:1px solid var(--gold);border-radius:8px;padding:12px;font-size:13px">';
  h+='<div style="font-size:14px;font-weight:900;color:var(--gold);text-align:center;margin-bottom:10px">📊 回测结果</div>';
  h+='<div style="font-size:11px;color:var(--dim);text-align:center;margin-bottom:10px">热区: '+hz.zoneArr.join(' ')+'</div>';
  function row(label,val,color){return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd)"><span style="color:var(--dim)">'+label+'</span><span style="font-weight:700;'+(color?'color:'+color:'')+'">'+val+'</span></div>';}
  h+=row('总轮数',s.rounds+' 轮');
  h+=row('胜率(每轮)',winRate+'%',winRate>=50?'#4ade80':'#f87171');
  h+=row('单局命中率',hitRate+'%',hitRate>=18.9?'#4ade80':'#f87171');
  h+=row('最大连黑(整轮没中)',s.maxLoseStreak+' 次',s.maxLoseStreak>=8?'#f87171':'');
  h+=row('热区号最长不出',s.maxGap+' 局',s.maxGap>=40?'#f87171':'');
  h+='</div>';
  // ===== 最近11100局(每号平均300次)显著性监测 =====
  var W=11100;
  if(data.length>=2000){
    var win=data.length>W?data.slice(data.length-W):data;
    var hzW=hottestZone(win);
    if(hzW){
      var sw=computeState(win,hzW.zone);
      var bgW=sw.betGames,hgW=sw.hitGames;
      var pW=bgW?hgW/bgW:0;
      var p0=7/37;
      var se=Math.sqrt(p0*(1-p0)/bgW);
      var z=se>0?(pW-p0)/se:0;
      // 正态单尾p值(用误差函数近似)
      function normcdf(x){var t=1/(1+0.2316419*Math.abs(x));var d=0.3989423*Math.exp(-x*x/2);var p=d*t*(0.3193815+t*(-0.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));return x>0?1-p:p;}
      var pval=1-normcdf(z);
      var sig=pval<0.05;
      var hitW=(pW*100).toFixed(1);
      var col=sig?'#4ade80':'#f87171';
      h+='<div style="background:var(--s2);border:1px solid '+col+';border-radius:8px;padding:12px;font-size:13px;margin-top:10px">';
      h+='<div style="font-size:13px;font-weight:900;color:'+col+';text-align:center;margin-bottom:8px">最近'+win.length+'局 偏差监测</div>';
      h+='<div style="font-size:11px;color:var(--dim);text-align:center;margin-bottom:8px">热区: '+hzW.zoneArr.join(' ')+'</div>';
      h+=row('下注次数',bgW+' 次');
      h+=row('命中率',hitW+'%',pW>=p0?'#4ade80':'#f87171');
      h+=row('显著性 p值',pval.toFixed(4),col);
      h+='</div>';
    }
  }
  el.innerHTML=h;
}


var recExpanded=false;
function toggleRec(){recExpanded=!recExpanded;render();}
function renderRecPanel(hz){
  var data=getD();
  var rc=document.getElementById('recPanel');
  var zoneSet=hz?hz.zone:new Set();
  if(!data.length){rc.innerHTML='<div style="background:var(--s2);border-radius:8px;padding:10px;margin-bottom:10px;color:var(--dim);font-size:11px">数字记录盘 · 暂无数据</div>';return;}
  // 最多最近500局,最新在前
  var recent=data.slice(-500).reverse();
  var COLS=12;           // 每行固定12个
  var rows=5;            // 收起显示5整行
  var perRow=COLS*rows;  // =60
  var showCount=recExpanded?recent.length:perRow;
  var shown=recent.slice(0,showCount);
  var html='<div style="background:var(--s2);border-radius:8px;padding:10px;margin-bottom:10px">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
  html+='<span style="font-size:11px;color:var(--dim)">📋 数字记录盘 (共'+data.length+'局，紫框=热区号)</span>';
  html+='<button onclick="toggleRec()" style="background:var(--s3);border:1px solid var(--bd);color:var(--gold);border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer">'+(recExpanded?'收起':'查看全部')+'</button>';
  html+='</div>';
  html+='<div style="display:grid;grid-template-columns:repeat('+COLS+',1fr);gap:3px'+(recExpanded?';max-height:280px;overflow-y:auto':'')+'">';
  html+=shown.map(function(n){
    var hot=zoneSet.has(n);
    var bg=n===0?'#1a6b45':REDS.has(n)?'#b03030':'#1a1a2e';
    var bd=hot?'2px solid #bb44ff':'1px solid transparent';
    return '<div style="height:26px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;background:'+bg+';border:'+bd+'">'+n+'</div>';
  }).join('');
  html+='</div>';
  if(!recExpanded&&recent.length>perRow){
    html+='<div style="font-size:10px;color:var(--dim);text-align:center;margin-top:6px">点"查看全部"看最近'+recent.length+'局</div>';
  }
  html+='</div>';
  rc.innerHTML=html;
}

function renderTblBar(){
  var bar=document.getElementById('tblBar');
  bar.innerHTML=Object.keys(tbls).map(function(id){
    var t=tbls[id];
    return '<div class="tbl-btn'+(id===curId?' on':'')+'" onclick="switchTbl(\''+id+'\')"><span style="font-size:10px;font-weight:700">'+t.name+'</span> <span style="font-size:7px;opacity:0.5">'+t.data.length+'</span></div>';

function addOne(){
  var el=document.getElementById('si');var v=parseInt(el.value);
  if(isNaN(v)||v<0||v>36){el.style.borderColor='red';setTimeout(function(){el.style.borderColor='var(--gold)';},500);return;}
  getD().push(v);el.value='';render();
}
function addBatch(){
  var el=document.getElementById('batchInp');var parts=el.value.split(/[\s,]+/);var cnt=0;
  parts.forEach(function(p){var v=parseInt(p);if(!isNaN(v)&&v>=0&&v<=36){getD().push(v);cnt++;}});
  el.value='';render();
}
function undo(){var d=getD();if(d.length){d.pop();render();}}
function clearCur(){
  var d=getD();if(!d.length)return;
  if(!confirm('⚠️ 第1次确认\n\n清空当前盘「'+tbls[curId].name+'」'+d.length+'局数据?'))return;
  if(!confirm('⚠️ 第2次确认\n\n真的清空这'+d.length+'局?'))return;
  tbls[curId].data=[];render();
}
function addTbl(){
  var nm=document.getElementById('newName').value.trim()||('盘'+(Object.keys(tbls).length+1));
  var id='t'+Date.now();tbls[id]={name:nm,data:[]};curId=id;
  document.getElementById('newName').value='';render();
}
function delTbl(){
  if(Object.keys(tbls).length<=1){alert('至少保留一个盘');return;}
  var nm=tbls[curId].name,cnt=getD().length;
  if(!confirm('⚠️ 第1次确认\n\n删除盘「'+nm+'」('+cnt+'局)?'))return;
  if(!confirm('⚠️ 第2次确认\n\n真的永久删除「'+nm+'」?'))return;
  delete tbls[curId];curId=Object.keys(tbls)[0];render();
}
function switchTbl(id){curId=id;render();}

function cpExp(btn){
  var ta=document.getElementById('expText');
  ta.focus();ta.select();
  var ok=false;try{ok=document.execCommand('copy');}catch(e){}
  if(ok){btn.textContent='✅ 已复制!';}
  else if(navigator.clipboard){navigator.clipboard.writeText(ta.value).then(function(){btn.textContent='✅ 已复制!';});}
  else{alert('请手动选中文字复制');}
}
function exportCur(){
  var t=tbls[curId];
  if(!t){alert('没有可导出的盘');return;}
  if(!t.data||!t.data.length){alert('当前盘暂无数据');return;}
  var obj={version:1,exportedAt:new Date().toISOString(),tbls:{}};
  obj.tbls[curId]={name:t.name,data:t.data};
  showExport('导出当前盘：'+t.name+'（'+t.data.length+'局）','大禹轮盘_'+t.name+'_'+new Date().toISOString().slice(0,10)+'.txt',obj);
}
function exportAll(){
  var cnt=Object.keys(tbls).length;
  showExport('导出全部（'+cnt+'个盘）','大禹轮盘_全部备份_'+new Date().toISOString().slice(0,10)+'.txt',{version:1,exportedAt:new Date().toISOString(),tbls:tbls});
}
function importData(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(){
    try{
      var d=JSON.parse(r.result);
      if(d.tbls){
        Object.keys(d.tbls).forEach(function(id){
          var nid='t'+Date.now()+Math.floor(Math.random()*1000);
          tbls[nid]={name:d.tbls[id].name||'导入盘',data:d.tbls[id].data||[]};
        });
        curId=Object.keys(tbls)[Object.keys(tbls).length-1];
        render();alert('导入成功!');
      }else{alert('格式不对:找不到tbls');}
    }catch(err){alert('导入失败:'+err.message);}
  };
  r.readAsText(f);
}

// 粘贴JSON导入
function togglePaste(){
  var b=document.getElementById('pasteBox');
  b.style.display=b.style.display==='none'?'block':'none';
}
function importPaste(){
  var txt=document.getElementById('pasteArea').value.trim();
  if(!txt){alert('请先粘贴内容');return;}
  var cnt=0;
  // 先试JSON格式
  var isJson=false;
  try{
    var d=JSON.parse(txt);
    isJson=true;
    var src=d.tbls||d;
    Object.keys(src).forEach(function(k){
      var item=src[k];var name,data;
      if(item&&item.data){name=item.name||k;data=item.data;}
      else if(Array.isArray(item)){name=k;data=item;}
      else return;
      data=data.filter(function(n){return Number.isInteger(n)&&n>=0&&n<=36;});
      if(data.length){var nid='t'+Date.now()+Math.floor(Math.random()*100000);tbls[nid]={name:name,data:data};curId=nid;cnt++;}
    });
  }catch(e){isJson=false;}

  // 不是JSON → 文本智能识别
  if(!isJson){
    // 按行分割,每行可能是一个盘
    var lines=txt.split(/[\r\n]+/);
    lines.forEach(function(line){
      line=line.trim();if(!line)return;
      var name=null,numStr=line;
      // 识别盘名:
      // 格式 [盘名:XXX] 或 [盘名：XXX]
      var m1=line.match(/\[?\s*盘名\s*[:：]\s*([^\]\s]+)\s*\]?/);
      if(m1){name=m1[1];numStr=line.replace(m1[0],'');}
      else{
        // 格式 XXX: 数字  或  XXX 数字 (开头是非纯数字的词当盘名)
        var m2=line.match(/^([A-Za-z\u4e00-\u9fa5][A-Za-z0-9\u4e00-\u9fa5]*)\s*[:：]?\s+(.+)/);
        if(m2 && !/^\d+$/.test(m2[1])){
          name=m2[1];numStr=m2[2];
        }
      }
      // 去掉所有[...]标注
      numStr=numStr.replace(/\[[^\]]*\]/g,' ');
      // 提取0-36数字
      var nums=[];
      (numStr.match(/\d+/g)||[]).forEach(function(s){var v=parseInt(s);if(v>=0&&v<=36)nums.push(v);});
      if(nums.length>=5){  // 至少5个数字才算一个盘
        if(!name)name='导入盘'+(Object.keys(tbls).length+1+cnt);
        var nid='t'+Date.now()+Math.floor(Math.random()*100000);
        tbls[nid]={name:name,data:nums};curId=nid;cnt++;
      }
    });
  }

  if(cnt>0){render();document.getElementById('pasteArea').value='';alert('成功导入'+cnt+'个盘!');}
  else alert('没识别到有效数据\n支持:JSON / 盘名+数字 / [盘名:XXX]数字');
}

function clickNum(n){getD().push(n);render();}

function renderBoard(hz,betting,betLevel){
  var el=document.getElementById('board');
  var data=getD();
  var zoneSet=hz?hz.zone:new Set();   // 平时也显示热区
  var hotColor=betLevel===2?'#bb44ff':'#ff44cc';  // 推荐时:二级紫,一级粉
  var hotAnim=betLevel===2?'hotglow':'pinkglow';

  function cell(n,h){
    var bg=n===0?'#1a6b45':REDS.has(n)?'#b03030':'#1a1a2e';
    var border='1px solid #2a2a4a',anim='';
    if(zoneSet.has(n)){
      if(betting){
        // 推荐中:粉/紫闪烁
        border='2px solid '+hotColor+';';anim='animation:'+hotAnim+' 1.1s infinite;';
      }else{
        // 平时:白色静止框,不闪
        border='2px solid #ffffff;';
      }
    }
    var st='background:'+bg+';border:'+border+';'+anim+'color:#fff;font-weight:700;font-size:11px;border-radius:4px;cursor:pointer;text-align:center;display:flex;align-items:center;justify-content:center;'+(h||'');
    return '<div style="'+st+'" onclick="clickNum('+n+')">'+n+'</div>';
  }

  // 投注盘(轮盘跑道,0在上排正中)
  var TOP=[29,7,28,12,35,3,26,0,32,15,19,4,21,2,25];
  var RIGHT=[17,34,6];
  var BOT=[31,14,20,1,33,16,24,5,10,23,8,30,11,36,13,27];
  var LEFT=[18,22,9];
  var html='';
  var cellH='height:32px;';
  html+='<div style="display:grid;grid-template-columns:repeat(15,1fr);gap:3px;margin-bottom:3px">';
  TOP.forEach(function(n){html+=cell(n,cellH);});
  html+='</div>';
  html+='<div style="display:flex;gap:3px;margin-bottom:3px">';
  html+='<div style="display:flex;flex-direction:column;gap:3px;width:calc((100% - 12*3px)/15)">';
  LEFT.forEach(function(n){html+=cell(n,'height:28px;');});
  html+='</div>';
  html+='<div style="flex:1;border:1px solid #2a2a4a;border-radius:6px;display:flex;align-items:center;justify-content:center;background:#0d1117;color:#3a4a5a;font-size:11px">轮盘跑道</div>';
  html+='<div style="display:flex;flex-direction:column;gap:3px;width:calc((100% - 12*3px)/15)">';
  RIGHT.forEach(function(n){html+=cell(n,'height:28px;');});
  html+='</div>';
  html+='</div>';
  html+='<div style="display:grid;grid-template-columns:repeat(16,1fr);gap:3px">';
  BOT.forEach(function(n){html+=cell(n,cellH);});
  html+='</div>';

  el.innerHTML=html;
}
